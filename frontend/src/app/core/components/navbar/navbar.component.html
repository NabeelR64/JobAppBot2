<nav class="navbar">
    <div class="navbar-inner">
        <div class="logo" routerLink="/">
            <span class="logo-icon">⚡</span>
            <span class="logo-text">Jinder</span>
        </div>

        <!-- Mobile hamburger -->
        <button class="hamburger" (click)="toggleMobileMenu()" [class.active]="mobileMenuOpen" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- Overlay for mobile -->
        <div class="mobile-overlay" *ngIf="mobileMenuOpen" (click)="mobileMenuOpen = false"></div>

        <div class="nav-links" [class.mobile-open]="mobileMenuOpen">
            <a routerLink="/swipe" routerLinkActive="active" (click)="mobileMenuOpen = false">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z" />
                </svg>
                Swipe
            </a>
            <a routerLink="/dashboard" routerLinkActive="active" (click)="mobileMenuOpen = false">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                </svg>
                Applications
            </a>
            <a routerLink="/onboarding" routerLinkActive="active" (click)="mobileMenuOpen = false">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                Profile
            </a>

            <div class="auth-section">
                <ng-container *ngIf="authService.isAuthenticated(); else loginBtn">
                    <div class="user-dropdown" (click)="toggleDropdown()">
                        <div class="user-avatar">
                            {{ (authService.currentUser()?.profile?.name || authService.currentUser()?.email ||
                            '?')[0].toUpperCase() }}
                        </div>
                        <span class="username" *ngIf="authService.currentUser() as user">
                            {{ user.profile?.name || user.email }}
                        </span>
                        <svg class="chevron" [class.open]="showDropdown" width="16" height="16" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9" />
                        </svg>
                        <div class="dropdown-content" *ngIf="showDropdown">
                            <a routerLink="/onboarding" (click)="showDropdown = false">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                    <circle cx="12" cy="7" r="4" />
                                </svg>
                                Edit Profile
                            </a>
                            <a (click)="logout()" class="logout-link">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                                    <polyline points="16 17 21 12 16 7" />
                                    <line x1="21" y1="12" x2="9" y2="12" />
                                </svg>
                                Logout
                            </a>
                        </div>
                    </div>
                </ng-container>
                <ng-template #loginBtn>
                    <div id="google-btn"></div>
                </ng-template>
            </div>
        </div>
    </div>
</nav>
